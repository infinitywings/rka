name: Cleanup merged branches

on:
  # Auto-delete head branch after a PR is merged
  pull_request:
    types: [closed]

  # Manual trigger to clean up all stale merged branches
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Delete the head branch when a PR is merged
  delete-on-merge:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            if (branch === 'main') {
              console.log('Skipping deletion of main branch');
              return;
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (error) {
              console.log(`Could not delete branch ${branch}: ${error.message}`);
            }

  # Clean up all branches whose PRs have been merged
  cleanup-stale:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Delete all merged branches
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // List all branches
            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100,
            });

            // Get the default branch
            const repoData = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoData.data.default_branch;

            for (const branch of branches) {
              const branchName = branch.name;

              // Skip the default branch
              if (branchName === defaultBranch) {
                console.log(`Skipping default branch: ${branchName}`);
                continue;
              }

              // Check if there is a merged PR for this branch
              const pulls = await github.rest.pulls.list({
                owner,
                repo,
                head: `${owner}:${branchName}`,
                state: 'closed',
                per_page: 1,
              });

              const mergedPR = pulls.data.find(pr => pr.merged_at !== null);
              if (mergedPR) {
                try {
                  await github.rest.git.deleteRef({
                    owner,
                    repo,
                    ref: `heads/${branchName}`,
                  });
                  console.log(`Deleted branch: ${branchName} (merged in PR #${mergedPR.number})`);
                } catch (error) {
                  console.log(`Could not delete branch ${branchName}: ${error.message}`);
                }
              } else {
                console.log(`Keeping branch: ${branchName} (no merged PR found)`);
              }
            }
