# =============================================================
# RKA — Research Knowledge Agent
# One-click deployment: docker compose up -d
# =============================================================
#
# Prerequisites:
#   - Docker Desktop (macOS/Windows) or Docker Engine (Linux)
#
# Optional (for rka_ask / rka_generate_summary):
#   - A cloud LLM API key (e.g. OpenAI, Anthropic via LiteLLM)
#   - Or a local LLM server (LM Studio, Ollama)
#
# Usage:
#   docker compose up -d          # start
#   docker compose logs -f rka    # view logs
#   docker compose down           # stop
#
# Web UI:  http://localhost:9712
# API:     http://localhost:9712/docs
#
# Claude Desktop MCP config (~/.config/Claude/claude_desktop_config.json):
#   {
#     "mcpServers": {
#       "rka": {
#         "command": "docker",
#         "args": ["exec", "-i", "rka-server", "rka", "mcp"]
#       }
#     }
#   }
# =============================================================

services:
  rka:
    build: .
    container_name: rka-server
    ports:
      - "9712:9712"
    volumes:
      - rka-data:/data
    environment:
      # LLM is disabled by default. The background worker only needs embeddings.
      # To enable rka_ask / rka_generate_summary, set RKA_LLM_ENABLED=true
      # and configure the model/base below.
      # RKA_LLM_ENABLED: "true"
      # RKA_LLM_API_BASE: http://host.docker.internal:1234/v1
      # RKA_LLM_MODEL: openai/qwen3-32b
      PLACEHOLDER: ""
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
  rka-worker:
    build: .
    container_name: rka-worker
    command: ["rka", "worker"]
    healthcheck:
      disable: true
    volumes:
      - rka-data:/data
    # Worker only processes embedding jobs — no LLM needed
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - rka
    restart: unless-stopped

volumes:
  rka-data:
